services:
  diagnosis:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: diagnosis:latest
    working_dir: /opt/diagnosis
    environment:
      WEKA_JAR: /opt/weka/weka.jar
      DIAGNOSIS_OUTPUT_DIR: /opt/diagnosis/outputs
    volumes:
      - ..:/opt/diagnosis
    command: ["--help"]

  diagnosis-shell:
    image: diagnosis:latest
    depends_on:
      - diagnosis
    working_dir: /opt/diagnosis
    environment:
      WEKA_JAR: /opt/weka/weka.jar
      DIAGNOSIS_OUTPUT_DIR: /opt/diagnosis/outputs
    volumes:
      - ..:/opt/diagnosis
    entrypoint: ["/bin/bash"]
    tty: true
    stdin_open: true
